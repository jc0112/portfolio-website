# Application
spring.application.name=portfolio-backend
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/portfolio
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true

# SQL Initialization
spring.sql.init.mode=never

# File Upload
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=./uploads
app.base-url=http://localhost:8080

# JWT
app.jwt.secret=portfolio-website-secret-key-change-me-in-production-2024!!
app.jwt.expiration=86400000

# Owner credentials (used to bootstrap the owner account)
app.owner.username=admin
app.owner.password=password123

# Logging
logging.level.com.portfolio=DEBUG