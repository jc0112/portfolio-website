# Production overrides - all sensitive values come from environment variables

# Database - connects via Cloud SQL socket
spring.datasource.url=jdbc:postgresql:///${DB_NAME}?cloudSqlInstance=${CLOUD_SQL_INSTANCE}&socketFactory=com.google.cloud.sql.postgres.SocketFactory
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# No SQL init in production
spring.sql.init.mode=never

# Server
server.port=8080
app.base-url=${BASE_URL:https://placeholder}

# GCS
app.gcs.enabled=true
app.gcs.bucket=${GCS_BUCKET}

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# Owner credentials
app.owner.username=${OWNER_USERNAME}
app.owner.password=${OWNER_PASSWORD}